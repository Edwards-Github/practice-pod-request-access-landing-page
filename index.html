<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="icon" href="assets/favicon-32x32.png" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="left-container">
        <img src="assets/desktop/logo.svg" alt="pod-logo" class="pod-logo"/>
        <div class="text-container">
          <div class="title section">
            <h1>Publish your podcasts</h1>
            <h2>Everywhere.</h1>
          </div>
          <p>
            Upload your audio to Pod with a single click. We'll then distribute your
            podcast to Spotify, Apple Podcasts, Google Podcasts, Pocket Casts and
            more!
          </p>
          <form action="" method="post">
            <input type="email" id="user-email" placeholder="Email address" name="email" required/>
            <button class="btn">Request Access</button>
          </form>
          <div class="logos-container">
            <img src="assets/desktop/spotify.svg" alt="spotify-logo" class="logos"/>
            <img src="assets/desktop/apple-podcast.svg" alt="apple-podcast-logo" class="logos"/>
            <img
              src="assets/desktop/google-podcasts.svg"
              alt="google-podcasts-logo"
              class="logos"
            />
            <img src="assets/desktop/pocket-casts.svg" alt="pocket-casts-logo" class="logos"/>
          </div>
        </div>
      </div>
      <img src="assets/desktop/image-host.jpg" alt="image-of-podcaster" class="host-image">
    </div>
  </body>
</html>
